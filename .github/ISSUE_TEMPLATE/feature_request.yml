name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Explain the user or maintainer need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Include security, compatibility, and rollback considerations.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Project boundaries
      options:
        - label: This request does not require customer assets or private data.
          required: true
        - label: This request does not imply OpenAI endorsement or official status.
          required: true
